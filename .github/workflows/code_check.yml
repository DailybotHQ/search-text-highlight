name: Code Check

on:
  pull_request:
    branches:
      - 'main'
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: 'Setup Application'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
      - name: Step 0 - ⚙️ Enable Corepack
        run: corepack enable
      - name: Step 0a - 📁 Get pnpm store path
        id: pnpm-store
        run: echo "STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Step 0b - 📁 Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Step 1 - ⚙️ Install Dependencies
        run: corepack pnpm install --frozen-lockfile

  validate_linters_and_code_format:
    needs: setup
    name: 'Validate Linters and Code Format'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
      - name: Step 0 - ⚙️ Enable Corepack
        run: corepack enable
      - name: Step 0a - 📁 Get pnpm store path
        id: pnpm-store
        run: echo "STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Step 0b - 📁 Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Step 1 - ⚙️ Install Dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Step 2 - 🧪 Run Biome (lint + format check)
        run: corepack pnpm run biome:check

  tests:
    needs: validate_linters_and_code_format
    name: 'Run tests'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
      - name: Step 0 - ⚙️ Enable Corepack
        run: corepack enable
      - name: Step 0a - 📁 Get pnpm store path
        id: pnpm-store
        run: echo "STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Step 0b - 📁 Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Step 1 - ⚙️ Install Dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Step 2 - 🛠️ Build bundle (refresh dist for the exports bundle smoke test)
        run: corepack pnpm run build
      - name: Step 3 - 🧪 Run tests
        run: corepack pnpm run test
